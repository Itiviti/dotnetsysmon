name: Build NuGet package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore dotnetsysmon.cpu/dotnetsysmon.cpu.csproj

      - name: Build
        run: dotnet build dotnetsysmon.cpu/dotnetsysmon.cpu.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack dotnetsysmon.cpu/dotnetsysmon.cpu.csproj -c Release --no-build -o artifacts

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg


